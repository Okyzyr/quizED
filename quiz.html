<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Eksploracja Danych / Python ML</title>
<style>
  :root{
    --bg:#0f1220; --card:#1a1e33; --card2:#222742; --acc:#6c8cff; --acc2:#4cd3a5;
    --txt:#e8eaf2; --muted:#9aa0bd; --good:#3ddc97; --bad:#ff6b6b; --line:#2c3252;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:linear-gradient(160deg,#0f1220,#161a30);color:var(--txt);min-height:100vh;padding:24px}
  .wrap{max-width:780px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
    font-size:14px;color:var(--muted)}
  .bar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:20px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));
    width:0;transition:width .3s}
  .qnum{color:var(--acc);font-weight:600;font-size:13px;letter-spacing:.5px}
  .question{font-size:18px;font-weight:600;line-height:1.4;margin:6px 0 8px}
  pre{background:#0c0f1c;border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    overflow-x:auto;font-size:13px;color:#cfe3ff;margin:0 0 14px}
  .answers{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .ans{text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    padding:14px 16px;border-radius:12px;font-size:15px;cursor:pointer;transition:.15s;line-height:1.4}
  .ans:hover:not(:disabled){border-color:var(--acc);transform:translateY(-1px)}
  .ans:disabled{cursor:default}
  .ans.correct{border-color:var(--good);background:rgba(61,220,151,.13)}
  .ans.wrong{border-color:var(--bad);background:rgba(255,107,107,.13)}
  .ans .mark{float:right;font-weight:700}
  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
  .feedback{font-size:14px;font-weight:600;min-height:20px}
  .feedback.ok{color:var(--good)} .feedback.no{color:var(--bad)}
  button.nav{background:var(--acc);color:#0b0e1a;border:none;padding:11px 22px;border-radius:10px;
    font-weight:700;font-size:15px;cursor:pointer}
  button.nav:disabled{opacity:.4;cursor:not-allowed}
  .result{text-align:center;padding:20px 0}
  .score{font-size:54px;font-weight:800;margin:10px 0;
    background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .grade{font-size:18px;color:var(--muted);margin-bottom:24px}
  .review{text-align:left;margin-top:24px}
  .rev-item{padding:12px 0;border-top:1px solid var(--line);font-size:14px}
  .rev-q{font-weight:600;margin-bottom:4px}
  .rev-a{color:var(--muted)}
  .rev-a b.good{color:var(--good)} .rev-a b.bad{color:var(--bad)}
  .center{text-align:center}
</style>
</head>

const QUIZ_LEN = 25;

/* ---- narzędzia ---- */
function shuffle(a){
  a=a.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

let quiz, idx, score, answered, picks;

function startQuiz(){
  quiz = shuffle(BANK).slice(0, Math.min(QUIZ_LEN, BANK.length)).map(item=>{
    const opts = shuffle([
      {text:item.correct, correct:true},
      ...item.wrong.map(w=>({text:w, correct:false}))
    ]);
    return {q:item.q, code:item.code, opts};
  });
  idx=0; score=0; answered=false; picks=[];
  render();
}

function render(){
  const app=document.getElementById('app');
  const item=quiz[idx];
  const pct=Math.round((idx/quiz.length)*100);
  app.innerHTML=`
    <div class="card">
      <div class="topbar">
        <span>Pytanie ${idx+1} / ${quiz.length}</span>
        <span>Punkty: ${score}</span>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="qnum">PYTANIE ${idx+1}</div>
      <div class="question">${esc(item.q)}</div>
      ${item.code?`<pre>${esc(item.code)}</pre>`:''}
      <div class="answers" id="answers"></div>
      <div class="footer">
        <span class="feedback" id="fb"></span>
        <button class="nav" id="next" disabled>Dalej →</button>
      </div>
    </div>`;
  const box=document.getElementById('answers');
  item.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='ans';
    b.innerHTML=esc(o.text);
    b.onclick=()=>choose(i,b);
    box.appendChild(b);
  });
  document.getElementById('next').onclick=next;
}

function choose(i,btn){
  if(answered) return;
  answered=true;
  const item=quiz[idx];
  const chosen=item.opts[i];
  picks.push({q:item.q, chosen:chosen.text, correct:item.opts.find(o=>o.correct).text, ok:chosen.correct});
  const buttons=document.querySelectorAll('.ans');
  buttons.forEach((b,j)=>{
    b.disabled=true;
    if(item.opts[j].correct){b.classList.add('correct');b.querySelector('.mark')||(b.innerHTML+=' <span class="mark">✓</span>');}
    if(j===i && !item.opts[j].correct){b.classList.add('wrong');b.innerHTML+=' <span class="mark">✗</span>';}
  });
  const fb=document.getElementById('fb');
  if(chosen.correct){score++;fb.textContent='Dobrze!';fb.className='feedback ok';}
  else{fb.textContent='Źle — poprawna odpowiedź zaznaczona na zielono.';fb.className='feedback no';}
  document.getElementById('next').disabled=false;
  document.getElementById('next').textContent = (idx===quiz.length-1)?'Zobacz wynik →':'Dalej →';
}

function next(){
  if(idx<quiz.length-1){idx++;answered=false;render();}
  else showResult();
}

function showResult(){
  const pct=Math.round((score/quiz.length)*100);
  let grade;
  if(pct>=90) grade='Świetnie! 🎉';
  else if(pct>=70) grade='Dobry wynik 👍';
  else if(pct>=50) grade='Zaliczone, ale jest co poprawiać.';
  else grade='Warto jeszcze poćwiczyć.';
  const reviewHtml=picks.map((p,i)=>`
    <div class="rev-item">
      <div class="rev-q">${i+1}. ${esc(p.q)}</div>
      <div class="rev-a">Twoja odpowiedź: <b class="${p.ok?'good':'bad'}">${esc(p.chosen)}</b></div>
      ${p.ok?'':`<div class="rev-a">Poprawna: <b class="good">${esc(p.correct)}</b></div>`}
    </div>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="result">
        <div>Twój wynik</div>
        <div class="score">${score} / ${quiz.length}</div>
        <div class="grade">${pct}% · ${grade}</div>
        <button class="nav" onclick="startQuiz()">Spróbuj ponownie (nowe losowanie)</button>
      </div>
      <div class="review">
        <h3>Przegląd odpowiedzi</h3>
        ${reviewHtml}
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

startQuiz();
